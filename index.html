<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teslytics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0A0A0A;
    color: #F5F5F0;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
  }
  .logo span { color: #E8413C; }
  .tagline {
    font-size: 1.1rem;
    color: #A0A0A0;
    font-weight: 300;
  }
</style>
</head>
<body>
  <div>
    <div class="logo">Tesly<span>tics</span></div>
    <div class="tagline">Your Tesla. Your data.</div>
  </div>
</body>
</html>
